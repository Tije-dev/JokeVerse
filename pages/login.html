<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JokeVerse - Login / Signup</title>
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/style.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="../css/login.css">
</head>
<body>
  <div class="container d-flex justify-content-center align-items-center flex-column">
    <div class="auth-card position-relative">
      <h2 class="fw-bold mb-4 text-center"><i class="fa-solid fa-user"></i> <span id="formTitle">Login</span></h2>
      <form method="post" action="" id="loginForm">
        <div class="mb-3">
          <label for="loginEmail" class="form-label">Email address</label>
          <input type="email" class="form-control" id="loginEmail" required>
        </div>
        <div class="mb-3 position-relative">
          <label for="loginPassword" class="form-label">Password</label>
          <input type="password" class="form-control" id="loginPassword" required>
          <i class="fa-solid fa-eye" id="toggleLoginPassword"></i>
        </div>
        <button type="submit" class="btn btn-accent w-100 mb-2">Login</button>
        <div class="text-end">
          <a href="#" class="text-muted" style="font-size:0.95rem;"><span style=" color: var(--text-main);">Forgot password?</span></a>
        </div>
      </form>
      <form id="signupForm" style="display:none;">
        <div class="mb-3">
          <label for="signupEmail" class="form-label">Email address</label>
          <input type="email" class="form-control" id="signupEmail" required>
        </div>
        <div class="mb-3">
          <label for="signupUsername" class="form-label">Username</label>
          <input type="text" class="form-control" id="signupUsername" required>
        </div>
        <div class="mb-3 position-relative">
          <label for="signupPassword" class="form-label">Password</label>
          <input type="password" class="form-control" id="signupPassword" required>
          <i class="fa-solid fa-eye" id="toggleSignupPassword"></i>
        </div>
        <button type="submit" class="btn btn-accent w-100 mb-2">Sign Up</button>
      </form>
      <div class="auth-toggle text-center">
        <span id="toggleText">Don't have an account?</span>
        <button class="toggle-btn" id="toggleAuth">Sign Up</button>
      </div>
    </div>
    <footer class="text-center mt-5 text-muted">
      <span style="color: var(--text-main);">&copy; 2026 JokeVerse</span>
      <span class="ms-2"><i class="fa-solid fa-face-laugh-squint" style="color: var(--accent);"></i></span>
    </footer>
  </div>
<script src="../js/login.js"></script>
</body>
</html>
