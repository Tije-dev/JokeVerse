<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JokeVerse - Saved Jokes</title>
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/style.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="../css/save.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg" style="background: var(--secondary-bg);">
    <div class="container">
      <a class="navbar-brand logo fw-bold" href="landing.html"><i class="fa-solid fa-face-laugh-squint me-1" aria-hidden="true"></i><span style="color: var(--accent);">JokeVerse</span></a>
      <div class="ms-auto">
        <a href="save.html" class="btn btn-accent me-2" style="color: var(--text-main);">Saved Jokes</a>
        <a href="login.html" class="btn btn-outline-light">Logout</a>
      </div>
    </div>
  </nav>
  <div class="container mt-4">
    <div class="filter-bar d-flex flex-wrap align-items-center justify-content-between mb-4">
      <div class="d-flex flex-wrap align-items-center gap-2">
        <select id="filterCategory" class="form-select">
          <option value="all">All Categories</option>
          <option value="general">General</option>
          <option value="programming">Programming</option>
          <option value="dad">Dad Jokes</option>
          <option value="knock-knock">Knock Knock</option>
          <option value="science">Science</option>
          <option value="math">Math</option>
          <option value="technology">Technology</option>
          <option value="school">School</option>
          <option value="relationship">Relationship</option>
          <option value="food">Food</option>
          <option value="animal">Animal</option>
        </select>
        <input type="text" id="searchJoke" class="form-control" placeholder="Search jokes...">
      </div>
      <div>
        <select id="sortJoke" class="form-select">
          <option value="date">Sort by Date</option>
          <option value="category">Sort by Category</option>
          <option value="alpha">Sort A-Z</option>
        </select>
      </div>
    </div>
    <div id="jokeList">
      <!-- Joke cards will be rendered here -->
    </div>
    <div class="no-jokes" id="noJokes" style="display:none;">
      <i class="fa-regular fa-face-frown fa-2x"></i>
      <div>No jokes found.</div>
    </div>
  </div>
  <footer class="text-center mt-5 mb-3 text-muted">
    <span style="color: var(--text-main);">&copy; 2026 JokeVerse. All rights reserved.</span>
    <span class="ms-2"><i class="fa-solid fa-face-laugh-squint" style="color: var(--accent);"></i></span>
  </footer>
  <script type="module" src="../js/save.js"></script>
</body>
</html>
