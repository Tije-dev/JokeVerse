<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Joke App</title>

        <!-- Bootstrap -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="/css/variables.css">
        <link rel="stylesheet" href="/css/style.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
        <link rel="stylesheet" href="/css/main.css">
</head>

<body class="light-mode">

<nav class="navbar navbar-expand-lg mb-4">
    <div class="container">
        <a class="navbar-brand logo fw-bold" href="#"><i class="fa-solid fa-face-laugh-squint"></i> JokeVerse</a>
        <div class="ms-auto d-flex align-items-center gap-2 flex-wrap justify-content-end">
            <span id="navUser" class="small d-none" style="color: var(--primary-bg); max-width: 12rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;"></span>
            <a href="/index.html" class="btn btn-outline-light btn-sm">Home</a>
            <a href="/pages/save.html" class="btn btn-accent btn-icon"><i class="fa-solid fa-bookmark"></i>Saved</a>
            <button type="button" class="btn btn-outline-light btn-sm" data-action="logout" title="Log out"><i class="fa-solid fa-right-from-bracket" aria-hidden="true"></i><span class="d-none d-sm-inline"> Log out</span></button>
        </div>
    </div>
</nav>
<div class="container d-flex justify-content-center align-items-center flex-column">
    <div class="joke-card text-center">
        <h2 class="fw-bold mb-3"><i class="fa-solid fa-face-grin-squint-tears" style="color:var(--accent);"></i> Random Joke Generator</h2>
        <!-- Joke Display -->
        <p id="setup" class="fw-bold fs-5"></p>
        <p id="punchline" class="text-muted"></p>
        <!-- Loading -->
        <div id="loading" class="d-none">Loading...</div>
        <div class="row g-2 mt-3">
            <div class="col-12 col-md-6">
                <label class="form-label">Select Language</label>
                <select id="language" class="form-select">
                    <option value="en">English</option>
                    <option value="fr">French</option>
                    <option value="es">Spanish</option>
                    <option value="de">German</option>
                    <option value="ar">Arabic</option>
                    <option value="ha">Hausa</option>
                </select>
            </div>
            <div class="col-12 col-md-6">
                <label class="form-label">Select Joke Category</label>
                <select id="category" class="form-select">
                    <option value="general">General</option>
                    <option value="programming">Programming</option>
                    <option value="dad">Dad Jokes</option>
                    <option value="knock-knock">Knock Knock</option>
                    <option value="science">Science</option>
                    <option value="math">Math</option>
                    <option value="technology">Technology</option>
                    <option value="school">School</option>
                    <option value="relationship">Relationship</option>
                    <option value="food">Food</option>
                    <option value="animal">Animal</option>
                    <option value="random">Random</option>
                </select>
            </div>
        </div>
        <!-- Buttons -->
        <div class="d-flex flex-wrap justify-content-center gap-2 mt-4">
            <button class="btn btn-accent btn-icon" onclick="getJoke()"><i class="fa-solid fa-dice"></i>Get Joke</button>
            <button class="btn btn-accent btn-icon" onclick="translateJoke()"><i class="fa-solid fa-language"></i>Translate</button>
            <button class="btn btn-accent btn-icon copyTooltipParent" onclick="copyJoke()"><i class="fa-solid fa-copy"></i>Copy</button>
            <button class="btn btn-accent btn-icon" onclick="speakJoke()"><i class="fa-solid fa-volume-up"></i>Speak</button>
            <button class="btn btn-accent btn-icon" onclick="saveJoke()"><i class="fa-solid fa-bookmark"></i>Save</button>
        </div>
        <div id="copyTooltip" class="d-none mt-2">Copied!</div>
    </div>
</div>

<div class="modal fade modal-jokeverse" id="saveFeedbackModal" tabindex="-1" aria-labelledby="saveFeedbackModalTitle" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content shadow-lg">
            <div class="modal-header border-0 pb-0">
                <h5 class="modal-title d-flex align-items-center gap-2" id="saveFeedbackModalTitle"></h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body pt-2" id="saveFeedbackModalBody"></div>
            <div class="modal-footer border-0 pt-0 gap-2">
                <button type="button" class="btn btn-outline-light" data-bs-dismiss="modal">Close</button>
                <a href="/pages/save.html" class="btn btn-accent btn-icon d-none" id="saveFeedbackModalSavedBtn"><i class="fa-solid fa-bookmark"></i>View saved jokes</a>
            </div>
        </div>
    </div>
</div>

<footer class="footer text-center mt-5 mb-3">
    <span style="color: var(--primary-bg)">&copy; 2026 JokeVerse. All rights reserved.</span>
    <span class="ms-2"><i class="fa-solid fa-face-laugh-squint" style="color: var(--accent);"></i></span>
    <span class="ms-2" style="color: var(--primary-bg)">| Follow us:
        <a href="#" class="text-reset ms-1"><i class="fab fa-twitter"></i></a>
        <a href="#" class="text-reset ms-1"><i class="fab fa-facebook"></i></a>
        <a href="#" class="text-reset ms-1"><i class="fab fa-github"></i></a>
    </span>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/session.js"></script>
<script src="/js/logic.js"></script>
</body>
</html>
